name: Dependency Submission

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/dependency-submission@v6
        env:
          # Exclude the buildscript classpath configuration
          # These dependencies are build tooling, never shipped and not on any test path.
          DEPENDENCY_GRAPH_EXCLUDE_CONFIGURATIONS: "^classpath$"
