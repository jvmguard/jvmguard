name: docs

on:
  push:
    branches: [ "main" ]
    paths:
      - 'modules/docs/**'
      - 'modules/website/**'
      - '.github/workflows/docs.yml'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    uses: ./.github/workflows/docs-deploy.yml
