name: Weekly

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      suite:
        description: "Jobs to run"
        type: choice
        options:
          - all
          - unit-and-e2e
          - integration
        default: all
        required: false

permissions:
  contents: read

jobs:
  unit-and-e2e:
    if: github.event_name == 'schedule' || inputs.suite == 'all' || inputs.suite == 'unit-and-e2e'
    uses: ./.github/workflows/gradle-test.yml
    with:
      tasks: test :ui:e2eTest :ui:configE2eTest :ui:dataE2eTest
      timeout-minutes: 60
      playwright: true

  integration-tests:
    if: github.event_name == 'schedule' || inputs.suite == 'all' || inputs.suite == 'integration'
    strategy:
      fail-fast: false
      matrix:
        jdk: [8, 11, 17, 21, 25]
    uses: ./.github/workflows/gradle-test.yml
    with:
      tasks: :integration:integrationTest -Pjdks=${{ matrix.jdk }}
      timeout-minutes: 360
