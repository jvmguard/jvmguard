name: gradle build

on:
  workflow_dispatch:
    inputs:
      tasks:
        description: 'gradle tasks'
        required: true
        type: string
      branch:
        description: 'git branch'
        required: true
        type: string
      java:
        description: 'java major version'
        required: true
        type: string
      additional:
        description: 'additional script'
        required: false
        default: ''
        type: string
      displayname:
        description: 'custom run-name display'
        required: false
        default: ''
        type: string
      runner:
        description: 'runner name'
        required: false
        default: 'ubuntu-latest'
        type: string
      releaseType:
        description: 'create a GH release after build: "release", "prerelease", or empty'
        required: false
        default: ''
        type: string

concurrency:
  group: build-workflow-${{ inputs.branch }}

run-name: "${{ inputs.displayname != '' && inputs.displayname || inputs.tasks }} [${{ inputs.branch }}]"

permissions:
  contents: read

jobs:
  build:

    runs-on: ${{ inputs.runner }}
    timeout-minutes: 120
    permissions:
      contents: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: '0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Running gradle
        env:
          MAVEN_CENTRAL: "${{ secrets.MAVEN_CENTRAL }}"
          INSTALL4J_LICENSE_KEY: "${{ secrets.INSTALL4J_LICENSE_KEY }}"
        run: |
          export ORG_GRADLE_PROJECT_mavenCentralUsername=$(echo "$MAVEN_CENTRAL" | jq -er .username)
          echo "::add-mask::$ORG_GRADLE_PROJECT_mavenCentralUsername"
          export ORG_GRADLE_PROJECT_mavenCentralPassword=$(echo "$MAVEN_CENTRAL" | jq -er .password)
          echo "::add-mask::$ORG_GRADLE_PROJECT_mavenCentralPassword"

          ${{ inputs.additional }}
          ./gradlew ${{ inputs.tasks }} -Dorg.gradle.jvmargs=-Xmx1500M -Dkotlin.daemon.jvm.options=-Xmx2G --no-watch-fs --stacktrace
        shell: bash

      - name: Extract release notes
        if: inputs.releaseType != ''
        run: ./gradlew -q extractReleaseNotes

      - name: Create GitHub release and upload media
        if: inputs.releaseType != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(./gradlew -q printReleaseTag)
          VERSION=$(./gradlew -q printVersion)
          
          FLAGS=""
          if [ "${{ inputs.releaseType }}" = "prerelease" ]; then
            FLAGS="--prerelease"
          fi
          
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, uploading assets"
            gh release upload "$TAG" media/* --clobber
          else
            gh release create "$TAG" media/* \
              --title "jvmguard $VERSION" \
              --notes-file build/gradle/release-notes.md \
              $FLAGS
          fi
        shell: bash

      - name: Trigger docs/Pages rebuild
        if: inputs.releaseType == 'release'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docs.yml',
              ref: 'main',
            });

      - name: Upload notarization logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: notarization-logs
          path: |
            media/**/*.notarization.log
          if-no-files-found: ignore

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            build/gradle/**/reports