name: gradle build

on:
  workflow_dispatch:
    inputs:
      tasks:
        description: 'gradle tasks'
        required: true
        type: string
      branch:
        description: 'git branch'
        required: true
        type: string
      java:
        description: 'java major version'
        required: true
        type: string
      additional:
        description: 'additional script'
        required: false
        default: ''
        type: string
      displayname:
        description: 'custom run-name display'
        required: false
        default: ''
        type: string
      runner:
        description: 'runner name'
        required: false
        default: 'ubuntu-latest'
        type: string
      releaseType:
        description: 'create a GH release after build: "release", "prerelease", or empty'
        required: false
        default: ''
        type: string

concurrency:
  group: build-workflow-${{ inputs.branch }}

run-name: "${{ inputs.displayname != '' && inputs.displayname || inputs.tasks }} [${{ inputs.branch }}]"

permissions:
  contents: read

jobs:
  build:

    runs-on: ${{ inputs.runner }}
    timeout-minutes: 120
    permissions:
      contents: write
      actions: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: '0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Running gradle
        env:
          MAVEN_CENTRAL: "${{ secrets.MAVEN_CENTRAL }}"
          INSTALL4J_LICENSE_KEY: "${{ secrets.INSTALL4J_LICENSE_KEY }}"
        run: |
          export ORG_GRADLE_PROJECT_mavenCentralUsername=$(echo "$MAVEN_CENTRAL" | jq -er .username)
          echo "::add-mask::$ORG_GRADLE_PROJECT_mavenCentralUsername"
          export ORG_GRADLE_PROJECT_mavenCentralPassword=$(echo "$MAVEN_CENTRAL" | jq -er .password)
          echo "::add-mask::$ORG_GRADLE_PROJECT_mavenCentralPassword"

          ${{ inputs.additional }}
          ./gradlew ${{ inputs.tasks }} -Dorg.gradle.jvmargs=-Xmx1500M -Dkotlin.daemon.jvm.options=-Xmx2G --no-watch-fs --stacktrace
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            build/gradle/**/reports

  docs-deploy:
    needs: build
    if: inputs.releaseType == 'release'
    uses: ./.github/workflows/docs-deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write