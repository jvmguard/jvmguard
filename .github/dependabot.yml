version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      gradle-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]
      gradle-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: npm
    directories:
      - "/modules/website"
      - "/modules/docs"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]
      npm-security:
        applies-to: security-updates
        patterns: ["*"]

  # modules/ui/package.json is generated by the Vaadin Gradle plugin from the Vaadin platform version
  - package-ecosystem: npm
    directory: "/modules/ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions-all:
        applies-to: version-updates
        patterns: ["*"]
      actions-security:
        applies-to: security-updates
        patterns: ["*"]
